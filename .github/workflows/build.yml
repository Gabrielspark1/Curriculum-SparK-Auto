name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev libltdl-dev
          sudo ln -sf /lib/x86_64-linux-gnu/libtinfo.so.6 /lib/x86_64-linux-gnu/libtinfo.so.5
          pip install --user Cython==0.29.33 virtualenv buildozer

      - name: 🚀 Descargar ReportLab y Pillow en la raíz (Solución al Crash)
        run: |
          # Esto instala las librerías directamente al lado de tu main.py para que Buildozer las empaquete sin fallar
          pip install --target=. reportlab pillow

      - name: Configurar variables para GitHub Actions
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Compilar APK
        env:
          BUILDOZER_GITHUB_ACTIONS: 1
        run: |
          buildozer android clean
          yes | buildozer -v android debug

      - name: Subir APK
        uses: actions/upload-artifact@v3
        with:
          name: APK-Final
          path: bin/*.apk
